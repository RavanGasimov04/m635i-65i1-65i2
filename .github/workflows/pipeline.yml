name: CI — Build_Test (DevOps Security Pipeline)

# ─────────────────────────────────────────────
# TRIGGER: Runs on Pull Request + Push
# ─────────────────────────────────────────────
on:
  pull_request:
    branches: ["main"]
  push:
    branches: ["main"]

jobs:

  # ── JOB 1: Lint & Validate ──────────────────────────────
  lint_and_validate:
    name: 🔍 Lint & Validate Configs
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      - name: 🐍 Set Up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 📦 Install Linting Tools
        run: |
          pip install yamllint==1.35.1 --quiet
          echo "✅ yamllint installed"

      - name: 🔎 Lint YAML Files
        run: |
          echo "── Scanning YAML files ──"
          yamllint -d relaxed .github/workflows/ || true
          echo "✅ YAML lint complete"

      - name: 🔎 Validate Shell Scripts
        run: |
          sudo apt-get install -y shellcheck --quiet
          echo "── Running ShellCheck ──"
          find ./scripts -name "*.sh" -exec shellcheck {} \; || true
          echo "✅ ShellCheck complete"

      - name: 📋 Print Environment Info
        run: |
          echo "OS: $(uname -a)"
          echo "Git: $(git --version)"
          echo "Python: $(python --version)"
          echo "Branch: ${{ github.head_ref }}"
          echo "Actor: ${{ github.actor }}"

  # ── JOB 2: Security Scan ──────────────────────────────
  security_scan:
    name: 🛡️ Security Scan
    runs-on: ubuntu-latest
    needs: lint_and_validate

    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      - name: 🔐 Secret Detection
        run: |
          echo "── Scanning for secrets ──"
          FOUND=0

          patterns=(
            "password\s*=\s*['\"][^'\"]{4,}"
            "secret\s*=\s*['\"][^'\"]{4,}"
            "api_key\s*=\s*['\"][^'\"]{4,}"
            "AWS_SECRET"
            "PRIVATE_KEY"
          )

          for pattern in "${patterns[@]}"; do
            if grep -rEi "$pattern" ./src ./scripts 2>/dev/null | grep -v ".example" | grep -q .; then
              echo "⚠️ Possible secret found: $pattern"
              FOUND=1
            fi
          done

          if [ "$FOUND" -eq 0 ]; then
            echo "✅ No secrets detected"
          else
            echo "❌ Secrets found!"
            exit 1
          fi

      - name: 🐋 Dockerfile Check
        run: |
          echo "── Checking Dockerfile ──"
          if [ -f "Dockerfile" ]; then
            grep -q "FROM.*:latest" Dockerfile && echo "⚠️ avoid :latest"
            grep -q "USER" Dockerfile || echo "⚠️ missing USER directive"
            echo "✅ Dockerfile check complete"
          else
            echo "ℹ️ No Dockerfile found"
          fi

      - name: 🔒 Dependency Scan
        run: |
          pip install safety==3.2.3 --quiet || true
          echo "── Checking dependencies ──"

          if [ -f "requirements.txt" ]; then
            safety check -r requirements.txt --output text || true
          else
            echo "ℹ️ No requirements.txt found — skipping"
          fi